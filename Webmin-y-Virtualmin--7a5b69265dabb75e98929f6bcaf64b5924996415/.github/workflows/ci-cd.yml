name: CI/CD Pipeline - Webmin/Virtualmin DevOps

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
  release:
    types: [ published ]

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: webmin-virtualmin-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===== CI: Continuous Integration =====
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js for tooling
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Set up Python for testing
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install shellcheck for shell script validation
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        if [ -f database_manager/backend/requirements.txt ]; then pip install -r database_manager/backend/requirements.txt; fi
        if [ -f microservices/requirements.txt ]; then pip install -r microservices/requirements.txt; fi

    - name: Validate shell scripts
      run: |
        find . -name "*.sh" -type f -exec shellcheck {} \;

    - name: Run smoke tests
      run: |
        bash scripts/run_smoke_tests.sh

    - name: Compile production Python services
      run: |
        python -m py_compile database_manager/backend/app.py
        python -m py_compile database_manager/backend/routes/auth.py
        python -m py_compile database_manager/backend/routes/databases.py
        python -m py_compile database_manager/backend/routes/tables.py
        python -m py_compile database_manager/backend/security.py
        python -m py_compile microservices/auth_service.py
        python -m py_compile microservices/api_gateway.py

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: smoke-test-results
        path: test_results/

  # ===== Code Quality Checks =====
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install quality tools
      run: |
        pip install flake8 black isort mypy

    - name: Install app dependencies for static analysis
      run: |
        if [ -f database_manager/backend/requirements.txt ]; then pip install -r database_manager/backend/requirements.txt; fi
        if [ -f microservices/requirements.txt ]; then pip install -r microservices/requirements.txt; fi

    - name: Run flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run black check
      run: |
        black --check --diff .

    - name: Run isort check
      run: |
        isort --check-only --diff .

    - name: Run mypy
      run: |
        mypy . --ignore-missing-imports || true

    - name: Validate Kubernetes manifest
      run: |
        python - <<'PY'
        import yaml
        with open('kubernetes/web-deployment.yaml', 'r', encoding='utf-8') as fh:
            list(yaml.safe_load_all(fh))
        print('Kubernetes manifest válido')
        PY

  # ===== Security Scanning =====
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.28.0
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Check for secrets
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===== Build =====
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, quality, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix=sha-

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ===== CD: Continuous Deployment =====
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to staging environment
      run: |
        trap 'rm -f kubeconfig' EXIT
        IMAGE_TAG="sha-${GITHUB_SHA::7}"
        test -n "${{ secrets.STAGING_KUBE_CONFIG_B64 }}"
        echo "${{ secrets.STAGING_KUBE_CONFIG_B64 }}" | base64 -d > kubeconfig
        export KUBECONFIG=$PWD/kubeconfig
        curl -fsSL -o kubectl https://dl.k8s.io/release/v1.29.3/bin/linux/amd64/kubectl
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/kubectl
        kubectl create namespace webmin --dry-run=client -o yaml | kubectl apply -f -
        kubectl apply -n webmin -f kubernetes/web-deployment.yaml
        kubectl set image deployment/web-service web-service=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG} -n webmin
        kubectl rollout status deployment/web-service -n webmin --timeout=180s

    - name: Run smoke tests on staging
      run: |
        trap 'rm -f kubeconfig' EXIT
        echo "${{ secrets.STAGING_KUBE_CONFIG_B64 }}" | base64 -d > kubeconfig
        export KUBECONFIG=$PWD/kubeconfig
        kubectl get pods -n webmin
        kubectl get svc web-service -n webmin

    - name: Notify deployment
      run: |
        echo "📢 Staging deployment completed"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    environment: production
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to production environment
      run: |
        trap 'rm -f kubeconfig' EXIT
        IMAGE_TAG="sha-${GITHUB_SHA::7}"
        test -n "${{ secrets.PRODUCTION_KUBE_CONFIG_B64 }}"
        echo "${{ secrets.PRODUCTION_KUBE_CONFIG_B64 }}" | base64 -d > kubeconfig
        export KUBECONFIG=$PWD/kubeconfig
        curl -fsSL -o kubectl https://dl.k8s.io/release/v1.29.3/bin/linux/amd64/kubectl
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/kubectl
        kubectl create namespace webmin --dry-run=client -o yaml | kubectl apply -f -
        kubectl apply -n webmin -f kubernetes/web-deployment.yaml
        kubectl set image deployment/web-service web-service=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG} -n webmin
        kubectl rollout status deployment/web-service -n webmin --timeout=180s

    - name: Run smoke tests on production
      run: |
        trap 'rm -f kubeconfig' EXIT
        echo "${{ secrets.PRODUCTION_KUBE_CONFIG_B64 }}" | base64 -d > kubeconfig
        export KUBECONFIG=$PWD/kubeconfig
        kubectl get pods -n webmin
        kubectl get svc web-service -n webmin

    - name: Create deployment notification
      run: |
        echo "📢 Production deployment completed"

  # ===== Release Management =====
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [test, quality, security]
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate changelog
      run: |
        echo "📝 Generating changelog for release ${{ github.event.release.tag_name }}..."
        # Aquí iría la lógica para generar changelog

    - name: Create release artifacts
      run: |
        echo "📦 Creating release artifacts..."
        zip -r release-artifacts.zip Dockerfile .github/workflows/ci-cd.yml kubernetes/web-deployment.yaml infrastructure/terraform/main.tf database_manager/backend microservices

    - name: Upload release assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./release-artifacts.zip
        asset_name: webmin-virtualmin-${{ github.event.release.tag_name }}.zip
        asset_content_type: application/zip

  # ===== Notification =====
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production, release]
    if: always()

    steps:
    - name: Send success notification
      if: needs.deploy-production.result == 'success' || needs.release.result == 'success'
      run: |
        echo "✅ Pipeline completed successfully"
        # Aquí iría la lógica de notificación de éxito

    - name: Send failure notification
      if: failure()
      run: |
        echo "❌ Pipeline failed"
        # Aquí iría la lógica de notificación de fallo
