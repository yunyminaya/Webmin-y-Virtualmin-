# Configuración de Backups Enterprise
# Auto-detecta rutas y soporta Virtualmin domain backups
# Última actualización: ver git log

# Directorio base de backups (auto-detecta según el SO)
if [[ -d "/opt/enterprise_backups" ]]; then
    BACKUP_ROOT="/opt/enterprise_backups"
elif [[ -d "/home" ]]; then
    BACKUP_ROOT="/var/backups/enterprise"
else
    BACKUP_ROOT="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)/enterprise_backups"
fi

# Virtualmin domain backup settings
VIRTUALMIN_BACKUP_ENABLED=true
VIRTUALMIN_BACKUP_DIR="$BACKUP_ROOT/virtualmin-domains"
VIRTUALMIN_BACKUP_FEATURES="all-features"
VIRTUALMIN_BACKUP_RETENTION=7
VIRTUALMIN_BACKUP_SCHEDULE="0 3 * * *"  # Diario 3 AM
DAILY_DIR="$BACKUP_ROOT/daily"
WEEKLY_DIR="$BACKUP_ROOT/weekly"
MONTHLY_DIR="$BACKUP_ROOT/monthly"
CONFIG_DIR="$BACKUP_ROOT/configs"
DB_DIR="$BACKUP_ROOT/databases"
LOG_DIR="$BACKUP_ROOT/logs"

# Retención de backups (días)
DAILY_RETENTION=7
WEEKLY_RETENTION=30
MONTHLY_RETENTION=365

# Directorios a respaldar
BACKUP_DIRS=(
    "/etc"
    "/var/www"
    "/var/lib/mysql"
    "/var/log"
    "/opt"
    "/usr/local"
    "/home"
)

# Bases de datos a respaldar
DATABASES=(
    "mysql"
    "information_schema"
    "performance_schema"
)

# Archivos de configuración críticos
CONFIG_FILES=(
    "/etc/apache2/apache2.conf"
    "/etc/mysql/mysql.conf.d/mysqld.cnf"
    "/etc/ssh/sshd_config"
    "/etc/fstab"
    "/etc/crontab"
    "/etc/hosts"
    "/etc/resolv.conf"
)

# Opciones de compresión
COMPRESSION_LEVEL=6
COMPRESSION_TYPE="gzip"

# Opciones de encriptación
ENCRYPT_BACKUPS=true
ENCRYPTION_KEY_FILE="$BACKUP_ROOT/.backup_key"

# Notificaciones
ENABLE_NOTIFICATIONS=true
NOTIFICATION_EMAIL="admin@enterprise.local"

# Exclusiones
EXCLUDE_PATTERNS=(
    "*.log"
    "*.tmp"
    "*.cache"
    "*/cache/*"
    "*/tmp/*"
    "*/.git/*"
)
