apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-service
  labels:
    app: web-service
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: web-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: web-service
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      volumes:
      - name: tmp
        emptyDir: {}
      containers:
      - name: web-service
        image: ghcr.io/yunyminaya/webmin-y-virtualmin:1.0.0
        imagePullPolicy: IfNotPresent
        env:
        - name: APP_ENV
          value: production
        - name: APP_DEBUG
          value: "false"
        - name: APP_PORT
          value: "5000"
        - name: APP_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: web-service-secrets
              key: app-secret-key
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: web-service-secrets
              key: jwt-secret-key
        - name: JWT_SALT
          valueFrom:
            secretKeyRef:
              name: web-service-secrets
              key: jwt-salt
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: web-service-secrets
              key: database-url
        - name: CORS_ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: web-service-config
              key: cors-allowed-origins
        - name: LOGIN_RATE_LIMIT_ATTEMPTS
          valueFrom:
            configMapKeyRef:
              name: web-service-config
              key: login-rate-limit-attempts
        - name: LOGIN_RATE_LIMIT_WINDOW_SECONDS
          valueFrom:
            configMapKeyRef:
              name: web-service-config
              key: login-rate-limit-window-seconds
        - name: LOGIN_LOCKOUT_SECONDS
          valueFrom:
            configMapKeyRef:
              name: web-service-config
              key: login-lockout-seconds
        resources:
          limits:
            cpu: 1000m
            memory: 512Mi
          requests:
            cpu: 200m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsGroup: 10001
          runAsUser: 10001
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        ports:
        - containerPort: 5000
          name: http
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 20
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          failureThreshold: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  selector:
    app: web-service
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: web-service-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: web-service
